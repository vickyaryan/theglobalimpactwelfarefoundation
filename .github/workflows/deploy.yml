name: Deploy to Hostinger 🚀

on:
  push:
    branches:
      - main # Teri branch ka naam screenshot mein master tha, wahi rakha hai.

jobs:
  web-deploy:
    name: 🎉 Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Modern Vite projects ke liye 20 best hai

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠️ Build Project
        # CI=false isliye lagaya hai taaki warnings ki wajah se build fail na ho
        run: CI=false npm run build 
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Agar Gemini API key bhi hai toh wo bhi add kar dena yahan

      - name: 📂 Sync files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Vite projects mein 'dist' folder banta hai
          local-dir: ./dist/ 
          server-dir: /public_html/
